    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderQuiz() {
      const container = document.getElementById('quiz-container');
      container.innerHTML = '';

      questions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `card-${q.id}`;

        const optionsHtml = q.options.map((opt, i) => `
          <label class="option-label" id="label-${q.id}-${i}">
            <input type="radio" name="question-${q.id}" value="${i}">
            <span>${String.fromCharCode(65 + i)}. ${escapeHtml(opt)}</span>
          </label>
        `).join('');

        card.innerHTML = `
          <div class="question-title">
            <span class="question-number">Q${q.id}.</span>
            <span>${escapeHtml(q.question)}</span>
          </div>
          <div class="options-list">
            ${optionsHtml}
          </div>
          <button class="check-btn" onclick="checkSingleAnswer(${q.id})">Check Answer</button>
          <div class="feedback-box" id="feedback-${q.id}"></div>
        `;

        container.appendChild(card);
      });
    }

    function checkSingleAnswer(qId) {
      const q = questions.find(item => item.id === qId);
      const selected = document.querySelector(`input[name="question-${qId}"]:checked`);
      const feedback = document.getElementById(`feedback-${qId}`);

      if (!selected) {
        feedback.className = 'feedback-box feedback-incorrect';
        feedback.style.display = 'block';
        feedback.innerHTML = '<strong>⚠️ Please select an option first!</strong>';
        return;
      }

      const selectedValue = parseInt(selected.value);
      feedback.style.display = 'block';

      // Highlight options
      q.options.forEach((_, i) => {
        const lbl = document.getElementById(`label-${qId}-${i}`);
        if (i === q.correct) {
          lbl.style.borderColor = '#22c55e';
          lbl.style.backgroundColor = '#14532d';
        } else if (i === selectedValue && selectedValue !== q.correct) {
          lbl.style.borderColor = '#ef4444';
          lbl.style.backgroundColor = '#7f1d1d';
        }
      });

      if (selectedValue === q.correct) {
        feedback.className = 'feedback-box feedback-correct';
        feedback.innerHTML = `<strong> Correct!</strong><br>${escapeHtml(q.explanation)}`;
      } else {
        feedback.className = 'feedback-box feedback-incorrect';
        feedback.innerHTML = `<strong>❌ Incorrect.</strong> Correct answer is <strong>${String.fromCharCode(65 + q.correct)}</strong>.<br>${escapeHtml(q.explanation)}`;
      }

      updateTotalScore();
    }

    function checkAllAnswers() {
      questions.forEach(q => checkSingleAnswer(q.id));
    }

    function updateTotalScore() {
      let correctCount = 0;
      questions.forEach(q => {
        const selected = document.querySelector(`input[name="question-${q.id}"]:checked`);
        if (selected && parseInt(selected.value) === q.correct) {
          correctCount++;
        }
      });

      const percent = Math.round((correctCount / questions.length) * 100);
      const scoreBadge = document.getElementById('score-text');
      scoreBadge.innerText = `${correctCount} / ${questions.length} (${percent}%)`;
      
      if (percent >= 80) {
        scoreBadge.style.color = '#10b981';
      } else if (percent >= 50) {
        scoreBadge.style.color = '#f59e0b';
      } else {
        scoreBadge.style.color = '#ef4444';
      }
    }

    // Initialize quiz on load
    window.onload = renderQuiz;
  </script>
